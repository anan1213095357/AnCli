name: QwenUpx AOT Build

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64, os: windows-latest, ext: zip, exe: QwenCli.exe }
          - { rid: win-x86, os: windows-latest, ext: zip, exe: QwenCli.exe }
          - { rid: win-arm64, os: windows-latest, ext: zip, exe: QwenCli.exe }
          - { rid: linux-x64, os: ubuntu-latest, ext: tar.gz, exe: QwenCli }
          - { rid: linux-arm64, os: ubuntu-24.04-arm, ext: tar.gz, exe: QwenCli }
          - { rid: osx-x64, os: macos-latest, ext: tar.gz, exe: QwenCli }
          - { rid: osx-arm64, os: macos-latest, ext: tar.gz, exe: QwenCli }

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 环境准备
      - name: Install Linux Dependencies
        if: startsWith(matrix.rid, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev build-essential

      # 1. 编译 AOT
      - name: Build AOT
        run: >
          dotnet publish -c Release 
          -r ${{ matrix.rid }} 
          -p:PublishAot=true 
          -p:StripSymbols=true 
          -o ./publish_out

      # 2. 核心修复：自动定位并移动文件
      # 无论 dotnet 把文件放在 ./publish_out 还是 ./publish_out/publish
      # 我们都把它统一挪到根目录下的 ./release_dist
      - name: Prepare Binary
        shell: bash
        run: |
          mkdir -p ./release_dist
          # 查找生成的可执行文件（排除 .pdb, .dbg 等杂质）
          find ./publish_out -type f \( -name "${{ matrix.exe }}" -o -name "${{ matrix.exe }}*" \) -not -name "*.pdb" -not -name "*.dbg" -exec cp {} ./release_dist/ \;
          echo "Files in release_dist:"
          ls ./release_dist/

      # 3. 只有特定平台走 UPX
      - name: Compress with UPX
        uses: svenstaro/upx-action@v2
        if: matrix.rid == 'win-x64' || matrix.rid == 'linux-x64'
        with:
          # 直接指向我们准备好的 release_dist 目录
          files: release_dist/${{ matrix.exe }}
          args: -9
          strip: false 

      # 4. 统一打包
      - name: Create Archive
        shell: bash
        run: |
          cd ./release_dist
          # 给 Unix 系统加权限
          if [[ "${{ matrix.os }}" != "windows-latest" ]]; then
            chmod +x *
          fi
          
          if [ "${{ matrix.ext }}" == "zip" ]; then
            tar -a -c -f ../QwenCli_${{ matrix.rid }}.zip *
          else
            tar -czvf ../QwenCli_${{ matrix.rid }}.tar.gz *
          fi

      # 5. 上传
      - name: Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: latest
          name: "Latest Build"
          files: QwenCli_${{ matrix.rid }}.${{ matrix.ext }}
