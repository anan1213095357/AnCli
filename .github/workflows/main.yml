name: QwenUpx AOT Build

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64, os: windows-latest, ext: zip, exe: QwenCli.exe }
          - { rid: win-x86, os: windows-latest, ext: zip, exe: QwenCli.exe }
          - { rid: win-arm64, os: windows-latest, ext: zip, exe: QwenCli.exe }
          - { rid: linux-x64, os: ubuntu-latest, ext: tar.gz, exe: QwenCli }
          - { rid: linux-arm64, os: ubuntu-24.04-arm, ext: tar.gz, exe: QwenCli }
          - { rid: osx-x64, os: macos-latest, ext: tar.gz, exe: QwenCli }
          - { rid: osx-arm64, os: macos-latest, ext: tar.gz, exe: QwenCli }

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Linux 环境必须的 AOT 依赖
      - name: Install Linux Dependencies
        if: startsWith(matrix.rid, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev build-essential

      # 1. 编译 AOT (去掉所有 UPX 干扰，直接输出)
      - name: Build AOT
        run: >
          dotnet publish -c Release 
          -r ${{ matrix.rid }} 
          -p:PublishAot=true 
          -p:StripSymbols=true 
          -o ./publish_dir

      # 2. 自动打包 (采用 GitHub 内置的 tar，避开大小写和路径坑)
      - name: Packaging
        shell: bash
        run: |
          # 进入输出目录，确保包内没有多余的层级
          cd ./publish_dir
          
          # 给 Unix 系列系统（Linux/macOS）的文件加执行权限
          if [[ "${{ matrix.os }}" != "windows-latest" ]]; then
            chmod +x *
          fi
          
          if [ "${{ matrix.ext }}" == "zip" ]; then
            # Windows/Zip: 使用内置 tar 创建 zip
            tar -a -c -f ../QwenCli_${{ matrix.rid }}.zip *
          else
            # Unix/Tar.gz: 创建压缩包并保留权限
            tar -czvf ../QwenCli_${{ matrix.rid }}.tar.gz *
          fi

      # 3. 发布到 Release
      - name: Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: latest
          name: "Latest Build"
          files: QwenCli_${{ matrix.rid }}.${{ matrix.ext }}
          generate_release_notes: true
